<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Watchlist</title>
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <header>
        <h1 class="search-page" id="search-page">Find your film</h1>
        <h3 class="watchlist-page" id="watchlist-page"><a href="watchlist.html">Watchlist</a></h3>
    </header>

    <main id="main-layout">
        <div class="search-bar" id="search-bar">
            <div class="part-one">
                <span class="material-symbols-outlined">
                    search
                </span>
                <input id="search-text" type="text" placeholder="Search for a movie...">
            </div>
            <div class="btn-div">
                <button class="search-btn" id="search-btn">Search</button>
            </div>

        </div>
        <div class="results" id="results">
        </div>
        <div class="no-data" id="no-data">
            <span class="material-symbols-outlined">
                movie_info
            </span>
            <P class="no-film" id="no-film">Start exploring</P>
        </div>
    </main>
    <script src="index.js" type="module"></script>
</body>

</html>

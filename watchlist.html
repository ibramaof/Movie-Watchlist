<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Watchlist</title>
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body id="watchlist-page">
    <header>
        <h1 class="search-page" id="search-page">My Watchlist</h1>
        <h3 class="watchlist-page" id="watchlist-page"><a href="index.html">Find your film</a></h3>
    </header>
    <main>
        <div class="watchlist-results" id="watchlist-results">
        </div>
        <div class="no-data watchlist-no-data" id="watchlist-no-data">
            <P class="no-film" id="no-film">Your watchlist is looking a little empty...</P>
            <button class="add-btn" id="add-btn"> <a href="index.html"><i
                        class="fa-solid fa-circle-plus fa-shake"></i></i>
                    Let’s add some movies!</a></button>
        </div>
    </main>
    <script src="watchlist.js" type="module"></script>
</body>

</html>
